<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RunHop Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Fonts: Plus Jakarta Sans (headings, closest to General Sans) + Inter (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Docsify theme (base) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    /* ══════════════════════════════════════
       RunHop Learning Theme
       Dark mode, warm accent colors,
       designed for focus and retention
       ══════════════════════════════════════ */

    :root {
      /* ── Palette ── */
      --bg-deep:     #0c0e14;
      --bg-base:     #12141c;
      --bg-surface:  #1a1d2b;
      --bg-elevated: #222639;
      --bg-hover:    #2a2f45;

      --text-primary:   #eaedf3;
      --text-secondary: #a0a6ba;
      --text-muted:     #6b7189;

      --accent:         #818cf8;  /* Indigo — primary */
      --accent-bright:  #a5b4fc;
      --accent-dim:     rgba(129, 140, 248, 0.12);

      --green:    #34d399;  /* Success, hints */
      --green-bg: rgba(52, 211, 153, 0.08);
      --amber:    #fbbf24;  /* Warnings, important */
      --amber-bg: rgba(251, 191, 36, 0.08);
      --cyan:     #22d3ee;  /* Dart/Flutter analogies */
      --cyan-bg:  rgba(34, 211, 238, 0.06);
      --rose:     #fb7185;  /* Errors, critical */
      --rose-bg:  rgba(251, 113, 133, 0.08);
      --purple:   #c084fc;  /* New concepts */
      --purple-bg: rgba(192, 132, 252, 0.08);

      --border: #1e2235;
      --border-light: #2a2f45;

      /* ── Docsify theme vars ── */
      --theme-color: var(--accent);
      --base-background-color: var(--bg-base);
      --base-color: var(--text-primary);

      /* Sidebar */
      --sidebar-background: var(--bg-deep);
      --sidebar-width: 310px;
      --sidebar-border-color: var(--border);
      --sidebar-name-color: var(--text-primary);
      --sidebar-name-font-weight: 800;
      --sidebar-nav-link-color: var(--text-muted);
      --sidebar-nav-link-color--active: var(--accent);
      --sidebar-nav-link-color--hover: var(--accent-bright);
      --sidebar-nav-link-border-color: transparent;
      --sidebar-nav-link-border-color--active: var(--accent);
      --sidebar-nav-link-border-width: 2px;
      --sidebar-nav-link-font-weight: 400;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-pagelink-padding: 0.25em 0;
      --sidebar-nav-indent: 18px;

      /* Content */
      --content-max-width: 880px;

      /* Headings — using docsify-themeable vars */
      --heading-color: var(--text-primary);
      --heading-h1-color: var(--text-primary);
      --heading-h2-color: var(--text-primary);
      --heading-h2-border-color: var(--border);
      --heading-h3-color: var(--text-secondary);
      --heading-h4-color: var(--text-muted);
      --heading-h1-font-weight: 800;
      --heading-h2-font-weight: 700;
      --heading-h3-font-weight: 600;

      /* Code */
      --code-font-size: 0.85em;
      --code-inline-background: var(--bg-elevated);
      --code-inline-color: var(--accent-bright);
      --code-inline-border-radius: 5px;
      --code-inline-padding: 0.15em 0.45em;
      --code-block-border-radius: 10px;
      --code-theme-background: var(--bg-deep);
      --code-theme-text: #e6edf3;

      /* Links */
      --link-color: var(--accent);
      --link-color--hover: var(--accent-bright);
      --link-text-decoration: none;
      --link-text-decoration--hover: underline;

      /* Blockquotes */
      --blockquote-border-color: var(--accent);
      --blockquote-background: var(--accent-dim);
      --blockquote-border-width: 3px;

      /* Tables */
      --table-head-background: var(--bg-surface);
      --table-head-color: var(--text-primary);
      --table-body-border-color: var(--border);
      --table-row-odd-background: rgba(26, 29, 43, 0.6);
      --table-row-even-background: transparent;
      --table-cell-border-color: var(--border);

      /* Search */
      --search-background: var(--bg-surface);
      --search-color: var(--text-primary);
      --search-input-background-color: var(--bg-base);
      --search-input-color: var(--text-primary);
      --search-input-placeholder-color: var(--text-muted);
      --search-result-keyword-background: var(--accent-dim);
      --search-result-keyword-color: var(--accent-bright);

      /* Pagination */
      --pagination-border-color: var(--border);
      --pagination-title-color: var(--text-primary);
      --pagination-label-color: var(--text-muted);

      /* Cover */
      --cover-background-color: var(--bg-deep);

      /* Misc */
      --hr-border: 1px solid var(--border);
    }

    /* ══════════════════════════════════════
       BASE TYPOGRAPHY
       ══════════════════════════════════════ */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: var(--bg-base);
      letter-spacing: -0.01em;
    }

    /* ══════════════════════════════════════
       SIDEBAR — Clean navigation hierarchy
       ══════════════════════════════════════ */
    .sidebar {
      border-right: 1px solid var(--border);
      padding-top: 12px;
    }
    .sidebar-nav ul,
    .sidebar-nav li {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .sidebar-nav a::before,
    .sidebar-nav a::after,
    .sidebar-nav li::before,
    .sidebar-nav li::after {
      content: none !important;
      display: none !important;
    }
    .app-name-link {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      font-size: 1.15em !important;
      font-weight: 800 !important;
      letter-spacing: -0.02em;
    }
    /* Section labels (Getting Started, Implementation Plan, etc.) */
    .sidebar-nav > ul > li > a {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 0.68em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted) !important;
      margin-top: 16px;
      display: block;
    }

    /* Task-level links (h2) — primary items in the docs tree */
    .sidebar-nav > ul > li > ul > li > a {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 650;
      font-size: 0.84em;
      color: var(--text-secondary) !important;
      padding: 5px 0;
      display: block;
      line-height: 1.4;
    }
    .sidebar-nav > ul > li > ul > li > a:hover {
      color: var(--text-primary) !important;
    }
    .sidebar-nav > ul > li > ul > li > a.active {
      color: var(--accent) !important;
    }

    /* Step-level links (h3) — small, muted, clearly subordinate */
    .sidebar-nav > ul > li > ul > li > ul {
      border-left: 1px solid var(--border-light);
      margin-left: 10px;
      margin-top: 4px;
      padding-left: 12px;
    }
    .sidebar-nav > ul > li > ul > li > ul > li > a {
      font-family: 'Inter', sans-serif;
      font-size: 0.78em;
      font-weight: 500;
      color: var(--text-muted) !important;
      padding: 3px 0;
      display: block;
      line-height: 1.35;
    }
    .sidebar-nav > ul > li > ul > li > ul > li > a:hover {
      color: var(--text-secondary) !important;
    }
    .sidebar-nav > ul > li > ul > li > ul > li > a.active {
      color: var(--accent-bright) !important;
      font-weight: 500;
    }

    .sidebar-nav li {
      line-height: 1.55;
    }

    .sidebar-nav .app-sub-sidebar {
      padding-left: 0;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════
       CONTENT AREA — Readable, spacious
       ══════════════════════════════════════ */
    .markdown-section {
      max-width: 880px;
      color: var(--text-primary);
      padding: 30px 45px 60px;
    }
    .markdown-section p,
    .markdown-section li {
      line-height: 1.8;
      font-size: 0.94em;
      color: var(--text-secondary);
    }
    .markdown-section strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .markdown-section em {
      color: var(--text-secondary);
      font-style: italic;
    }
    .markdown-section hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 48px 0;
    }

    /* ══════════════════════════════════════
       HEADINGS — Clear visual hierarchy
       Tasks are BIG, Steps are smaller
       ══════════════════════════════════════ */
    .markdown-section h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2.2em;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-top: 0;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--accent);
    }

    /* Task headings — prominent, eye-catching */
    .markdown-section h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.65em;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-top: 56px;
      margin-bottom: 20px;
      padding: 18px 22px;
      background: linear-gradient(135deg, var(--accent-dim), rgba(192, 132, 252, 0.06));
      border-left: 4px solid var(--accent);
      border-radius: 0 10px 10px 0;
    }

    /* Step headings — clean, smaller, indented feel */
    .markdown-section h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1em;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--accent-bright);
      margin-top: 40px;
      margin-bottom: 12px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
    }

    .markdown-section h4 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95em;
      font-weight: 600;
      color: var(--text-secondary);
      margin-top: 28px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ══════════════════════════════════════
       CONCEPT BOXES (blockquotes)
       The colored callouts for learning
       ══════════════════════════════════════ */
    .markdown-section blockquote {
      border-radius: 0 10px 10px 0;
      padding: 18px 22px;
      margin: 24px 0;
      background: linear-gradient(135deg, var(--purple-bg), var(--cyan-bg));
      border-left: 3px solid var(--purple);
    }
    .markdown-section blockquote p {
      color: var(--text-secondary);
      line-height: 1.75;
    }
    .markdown-section blockquote strong {
      color: var(--purple);
    }
    .markdown-section blockquote code {
      background: rgba(192, 132, 252, 0.12) !important;
      color: var(--purple) !important;
    }

    /* ══════════════════════════════════════
       TABLES — Clean data display
       ══════════════════════════════════════ */
    .markdown-section table {
      display: table;
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin: 20px 0;
    }
    .markdown-section th {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      background: var(--bg-surface);
      padding: 12px 16px;
    }
    .markdown-section td {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.9em;
    }
    .markdown-section tr:hover td {
      background: var(--bg-surface);
    }

    /* ══════════════════════════════════════
       CODE — Dark, readable, distinct
       ══════════════════════════════════════ */
    .markdown-section pre {
      background: var(--bg-deep) !important;
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .markdown-section pre code {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.84em;
      line-height: 1.7;
      color: #e6edf3;
    }
    .markdown-section code {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-weight: 500;
    }
    /* Inline code */
    .markdown-section :not(pre) > code {
      padding: 0.15em 0.5em;
      border-radius: 5px;
      font-size: 0.85em;
    }

    /* ══════════════════════════════════════
       CHECKBOXES — Interactive feel
       ══════════════════════════════════════ */
    .markdown-section input[type="checkbox"] {
      margin-right: 8px;
      accent-color: var(--green);
      transform: scale(1.2);
      cursor: pointer;
    }
    .markdown-section input[type="checkbox"]:checked + * {
      color: var(--text-muted);
    }

    /* ══════════════════════════════════════
       COPY CODE BUTTON
       ══════════════════════════════════════ */
    .docsify-copy-code-button {
      background: var(--bg-elevated) !important;
      color: var(--text-muted) !important;
      border-radius: 6px !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.72em !important;
      padding: 4px 10px !important;
      border: 1px solid var(--border) !important;
    }
    .docsify-copy-code-button:hover {
      background: var(--bg-hover) !important;
      color: var(--text-secondary) !important;
    }

    /* ══════════════════════════════════════
       COVER PAGE
       ══════════════════════════════════════ */
    .cover-main {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4f46e5 60%, #818cf8 100%) !important;
    }
    .cover-main h1 {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      font-weight: 800 !important;
    }

    /* ══════════════════════════════════════
       SCROLLBAR — Subtle, minimal
       ══════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 7px;
      height: 7px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-base);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--bg-elevated);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--bg-hover);
    }

    /* ══════════════════════════════════════
       SEARCH
       ══════════════════════════════════════ */
    .search input {
      font-family: 'Inter', sans-serif !important;
      background: var(--bg-surface) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border-light) !important;
      border-radius: 8px !important;
      padding: 10px 14px !important;
      font-size: 0.9em !important;
    }
    .search input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-dim) !important;
    }
    .search input::placeholder {
      color: var(--text-muted) !important;
    }
    .search .matching-post {
      border-bottom-color: var(--border) !important;
    }
    .search a {
      color: var(--accent) !important;
      font-weight: 500;
    }
    .search p {
      color: var(--text-muted) !important;
    }

    /* ══════════════════════════════════════
       PAGINATION
       ══════════════════════════════════════ */
    .pagination-item--previous a,
    .pagination-item--next a {
      color: var(--accent) !important;
      font-weight: 500;
    }
    .pagination-item-label {
      color: var(--text-muted) !important;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════
       LISTS — Better spacing for readability
       ══════════════════════════════════════ */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 24px;
    }
    .markdown-section li {
      margin-bottom: 6px;
    }
    .markdown-section li > ul,
    .markdown-section li > ol {
      margin-top: 6px;
    }

    /* ══════════════════════════════════════
       SELECTION — Accent colored
       ══════════════════════════════════════ */
    ::selection {
      background: rgba(129, 140, 248, 0.3);
      color: var(--text-primary);
    }

    /* ══════════════════════════════════════
       SMOOTH TRANSITIONS
       ══════════════════════════════════════ */
    a, .sidebar-nav a, .search input {
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    /* ══════════════════════════════════════
       POMODORO TIMER
       ══════════════════════════════════════ */
    #pomodoro {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 8px 14px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      font-family: 'Inter', sans-serif;
      user-select: none;
    }
    #pomo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #pomodoro.work {
      border-color: var(--accent);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-dim);
    }
    #pomodoro.rest {
      border-color: var(--green);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--green-bg);
    }

    #pomo-label {
      font-size: 0.65em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 4px;
    }
    #pomodoro.work #pomo-label {
      color: var(--accent-bright);
      background: var(--accent-dim);
    }
    #pomodoro.rest #pomo-label {
      color: var(--green);
      background: var(--green-bg);
    }

    #pomo-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2em;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 58px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    #pomo-btns {
      display: flex;
      gap: 4px;
    }
    #pomo-btns button {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.85em;
      line-height: 1;
      transition: all 0.15s ease;
    }
    #pomo-btns button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--accent);
    }
    #pomo-btns button.active {
      background: var(--accent-dim);
      color: var(--accent-bright);
      border-color: var(--accent);
    }

    #pomo-progress {
      position: absolute;
      bottom: 0;
      left: 14px;
      right: 14px;
      height: 2px;
      background: var(--bg-elevated);
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }
    #pomo-progress-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 1s linear;
    }
    #pomodoro.work #pomo-progress-bar {
      background: var(--accent);
    }
    #pomodoro.rest #pomo-progress-bar {
      background: var(--green);
    }

    /* Session tracker (4 rounds) — below timer */
    #pomo-sessions {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-light);
    }
    .pomo-dot {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      transition: all 0.4s ease;
    }
    .pomo-dot.done {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 6px var(--accent-dim);
    }
    .pomo-dot.active {
      border-color: var(--accent-bright);
      box-shadow: 0 0 8px var(--accent-dim);
      animation: pomo-pulse 2s ease-in-out infinite;
    }
    @keyframes pomo-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    #pomo-session-label {
      font-size: 0.5em;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    #pomo-reset-sets {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.6em;
      padding: 0 2px;
      opacity: 0.4;
      transition: opacity 0.15s ease, color 0.15s ease;
      line-height: 1;
    }
    #pomo-reset-sets:hover {
      opacity: 1;
      color: var(--accent-bright);
    }

    /* Finished overlay */
    #pomo-done-overlay {
      display: none;
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 10000;
      background: var(--bg-surface);
      border: 1px solid var(--green);
      border-radius: 12px;
      padding: 14px 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--green-bg);
      font-family: 'Inter', sans-serif;
      text-align: center;
      animation: pomo-fadeIn 0.5s ease;
    }
    #pomo-done-overlay.show { display: block; }
    @keyframes pomo-fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #pomo-done-overlay h3 {
      margin: 0 0 4px;
      font-size: 1em;
      color: var(--green);
    }
    #pomo-done-overlay p {
      margin: 0 0 10px;
      font-size: 0.8em;
      color: var(--text-muted);
    }
    #pomo-done-overlay .done-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 10px;
    }
    #pomo-done-overlay .done-dots .pomo-dot {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 6px var(--green-bg);
    }
    #pomo-restart-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 12px;
      font-size: 0.75em;
      transition: all 0.15s ease;
    }
    #pomo-restart-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--green);
    }

    @media (max-width: 768px) {
      #pomodoro {
        top: auto;
        bottom: 16px;
        right: 12px;
        padding: 6px 10px;
      }
      #pomo-time { font-size: 1em; }
      #pomo-done-overlay {
        top: auto;
        bottom: 16px;
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Pomodoro Timer -->
  <div id="pomodoro" class="work">
    <div id="pomo-row">
      <span id="pomo-label">WORK</span>
      <span id="pomo-time">25:00</span>
      <div id="pomo-btns">
        <button id="pomo-play" title="Play / Pause">▶</button>
        <button id="pomo-reset" title="Reset">↺</button>
        <button id="pomo-skip" title="Skip to rest / work">⏭</button>
      </div>
    </div>
    <div id="pomo-sessions">
      <span id="pomo-session-label">SETS</span>
      <div class="pomo-dot active" data-round="1"></div>
      <div class="pomo-dot" data-round="2"></div>
      <div class="pomo-dot" data-round="3"></div>
      <div class="pomo-dot" data-round="4"></div>
      <button id="pomo-reset-sets" title="Reset all sets">✕</button>
    </div>
    <div id="pomo-progress"><div id="pomo-progress-bar" style="width:100%"></div></div>
  </div>

  <!-- Done for today overlay -->
  <div id="pomo-done-overlay">
    <h3>You're done for today!</h3>
    <div class="done-dots">
      <div class="pomo-dot done"></div>
      <div class="pomo-dot done"></div>
      <div class="pomo-dot done"></div>
      <div class="pomo-dot done"></div>
    </div>
    <p>Great work. Come back tomorrow and keep learning.</p>
    <button id="pomo-restart-btn">Reset Sessions</button>
  </div>

  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'RunHop Docs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 4,
      sidebarDisplayLevel: 1,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results',
        depth: 4,
      },
      coverpage: true,
      themeColor: '#818cf8',
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
      },
      tabs: {
        persist: true,
        sync: false,
      },
    }
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-prisma.min.js"></script>

  <!-- Pomodoro Timer Logic -->
  <script>
  (function() {
    const WORK_MIN = 25;
    const REST_MIN = 5;
    const TOTAL_ROUNDS = 4;
    const STORAGE_KEY = 'pomo-sessions';

    let isWork = true;
    let totalSeconds = WORK_MIN * 60;
    let remaining = totalSeconds;
    let running = false;
    let interval = null;
    let completedRounds = 0;
    let dayFinished = false;

    const el = {
      root:     document.getElementById('pomodoro'),
      label:    document.getElementById('pomo-label'),
      time:     document.getElementById('pomo-time'),
      play:     document.getElementById('pomo-play'),
      reset:    document.getElementById('pomo-reset'),
      skip:     document.getElementById('pomo-skip'),
      progress: document.getElementById('pomo-progress-bar'),
      dots:     document.querySelectorAll('#pomo-sessions .pomo-dot'),
      overlay:  document.getElementById('pomo-done-overlay'),
      restart:  document.getElementById('pomo-restart-btn'),
      resetSets: document.getElementById('pomo-reset-sets'),
    };

    // Persist rounds per day using localStorage
    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function loadSession() {
      try {
        var data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (data && data.date === todayKey()) {
          completedRounds = data.rounds;
        } else {
          completedRounds = 0;
        }
      } catch(e) { completedRounds = 0; }
      if (completedRounds >= TOTAL_ROUNDS) dayFinished = true;
    }

    function saveSession() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        date: todayKey(),
        rounds: completedRounds
      }));
    }

    function fmt(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function renderDots() {
      el.dots.forEach(function(dot, i) {
        dot.classList.remove('done', 'active');
        if (i < completedRounds) {
          dot.classList.add('done');
        } else if (i === completedRounds && !dayFinished) {
          dot.classList.add('active');
        }
      });
    }

    function showDoneOverlay() {
      dayFinished = true;
      stop();
      el.root.style.display = 'none';
      el.overlay.classList.add('show');
    }

    function render() {
      if (dayFinished) { showDoneOverlay(); return; }
      el.root.style.display = 'flex';
      el.overlay.classList.remove('show');
      el.time.textContent = fmt(remaining);
      el.label.textContent = isWork ? 'WORK' : 'REST';
      el.root.className = isWork ? 'work' : 'rest';
      el.play.textContent = running ? '⏸' : '▶';
      el.play.classList.toggle('active', running);
      el.progress.style.width = (remaining / totalSeconds * 100) + '%';
      renderDots();
    }

    function beep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.2, 0.4].forEach(function(delay) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = isWork ? 880 : 660;
          osc.type = 'sine';
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.12);
        });
      } catch(e) {}
    }

    function tick() {
      remaining--;
      if (remaining <= 0) {
        stop();
        beep();
        // If a work session just ended, count it
        if (isWork) {
          completedRounds++;
          saveSession();
          if (completedRounds >= TOTAL_ROUNDS) {
            renderDots();
            setTimeout(showDoneOverlay, 600);
            return;
          }
        }
        // Auto-switch
        isWork = !isWork;
        totalSeconds = (isWork ? WORK_MIN : REST_MIN) * 60;
        remaining = totalSeconds;
        render();
      } else {
        render();
      }
    }

    function start() {
      if (running || dayFinished) return;
      running = true;
      interval = setInterval(tick, 1000);
      render();
    }

    function stop() {
      running = false;
      clearInterval(interval);
      interval = null;
      render();
    }

    function resetTimer() {
      stop();
      totalSeconds = (isWork ? WORK_MIN : REST_MIN) * 60;
      remaining = totalSeconds;
      render();
    }

    function skipPhase() {
      stop();
      isWork = !isWork;
      totalSeconds = (isWork ? WORK_MIN : REST_MIN) * 60;
      remaining = totalSeconds;
      render();
    }

    function resetSessions() {
      completedRounds = 0;
      dayFinished = false;
      isWork = true;
      totalSeconds = WORK_MIN * 60;
      remaining = totalSeconds;
      running = false;
      clearInterval(interval);
      interval = null;
      saveSession();
      render();
    }

    el.play.addEventListener('click', function() { running ? stop() : start(); });
    el.reset.addEventListener('click', resetTimer);
    el.skip.addEventListener('click', skipPhase);
    el.restart.addEventListener('click', resetSessions);
    el.resetSets.addEventListener('click', resetSessions);

    loadSession();
    render();
  })();
  </script>
</body>
</html>
